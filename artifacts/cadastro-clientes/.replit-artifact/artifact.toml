kind = "web"
previewPath = "/"
title = "Cadastro de Clientes"
version = "1.0.0"
id = "artifacts/cadastro-clientes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21446

[services.development]
run = "pnpm --filter @workspace/cadastro-clientes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cadastro-clientes", "run", "build" ]
publicDir = "artifacts/cadastro-clientes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21446"
BASE_PATH = "/"
